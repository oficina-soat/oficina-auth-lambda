quarkus.application.name=${OTEL_SERVICE_NAME:oficina-auth-lambda}
quarkus.datasource.db-kind=postgresql
oficina.observability.enabled=${OFICINA_OBSERVABILITY_ENABLED:true}
oficina.observability.json-logs.enabled=${OFICINA_OBSERVABILITY_JSON_LOGS_ENABLED:${oficina.observability.enabled}}
oficina.observability.metrics.enabled=${OFICINA_OBSERVABILITY_METRICS_ENABLED:${oficina.observability.enabled}}
oficina.observability.tracing.enabled=${OFICINA_OBSERVABILITY_TRACING_ENABLED:${oficina.observability.enabled}}
oficina.observability.deployment-environment=${DEPLOYMENT_ENVIRONMENT:lab}
quarkus.log.console.json.enabled=${oficina.observability.json-logs.enabled}
quarkus.log.console.json.exception-output-type=detailed
quarkus.log.console.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."service.namespace".value=oficina
quarkus.log.console.json.additional-field."service.version".value=${quarkus.application.version:unknown}
quarkus.log.console.json.additional-field."deployment.environment".value=${oficina.observability.deployment-environment}
quarkus.otel.enabled=true
quarkus.otel.simple=true
quarkus.otel.traces.enabled=${oficina.observability.tracing.enabled}
quarkus.otel.traces.exporter=none
quarkus.otel.resource.attributes=${OTEL_RESOURCE_ATTRIBUTES:service.namespace=oficina,deployment.environment=lab}
quarkus.otel.traces.suppress-application-uris=/q/metrics,/q/openapi,/q/swagger-ui,/q/swagger-ui/*
mp.jwt.verify.issuer=oficina-api
oficina.auth.issuer=${OFICINA_AUTH_ISSUER:oficina-api}
oficina.auth.audience=${OFICINA_AUTH_AUDIENCE:oficina-app}
oficina.auth.scope=${OFICINA_AUTH_SCOPE:oficina-app}
oficina.auth.key-id=${OFICINA_AUTH_KEY_ID:oficina-lab-rsa}

# Lambda runs one request at a time per execution environment, so a small pool avoids
# holding unnecessary RDS connections while still reusing the warm connection.
%prod.quarkus.datasource.jdbc.initial-size=0
%prod.quarkus.datasource.jdbc.min-size=0
%prod.quarkus.datasource.jdbc.max-size=2
%prod.quarkus.datasource.jdbc.acquisition-timeout=5S

%dev.quarkus.lambda.mock-event-server.dev-port=9080
%dev.quarkus.swagger-ui.always-include=true

%dev.quarkus.datasource.username=app
%dev.quarkus.datasource.password=app
%dev.quarkus.datasource.devservices.port=36759
%dev.quarkus.datasource.devservices.db-name=app
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
%dev.mp.jwt.verify.publickey.location=${MP_JWT_VERIFY_PUBLICKEY_LOCATION:file:src/main/resources/jwt/publicKey.pem}
%dev.smallrye.jwt.sign.key.location=${SMALLRYE_JWT_SIGN_KEY_LOCATION:file:src/main/resources/jwt/privateKey.pem}
%dev.quarkus.log.console.json.enabled=false

%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DEFAULT_NULL_ORDERING=HIGH
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.hibernate-orm.sql-load-script=import-h2.sql
%test.quarkus.lambda.mock-event-server.test-port=9081
%test.mp.jwt.verify.publickey.location=classpath:test-jwt/publicKey.pem
%test.smallrye.jwt.sign.key.location=classpath:test-jwt/privateKey.pem
%test.quarkus.log.console.json.enabled=false
