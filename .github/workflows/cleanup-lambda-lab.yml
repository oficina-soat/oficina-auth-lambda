name: Cleanup Lambda Lab

on:
  workflow_dispatch:
    inputs:
      confirm_cleanup:
        description: "Digite CLEANUP para confirmar a remocao dos recursos das Lambdas"
        required: true
        type: string
      lambda_target:
        description: "Lambda alvo do cleanup"
        required: true
        default: all
        type: choice
        options:
          - all
          - auth-lambda
          - notificacao-lambda

concurrency:
  group: lab-lambda
  cancel-in-progress: false

jobs:
  cleanup:
    if: >
      inputs.confirm_cleanup == 'CLEANUP'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - auth-lambda
          - notificacao-lambda
    environment:
      name: lab
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AUTH_LAMBDA_ATTACH_VPC: ${{ vars.AUTH_LAMBDA_ATTACH_VPC || 'true' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      AUTH_LAMBDA_LOG_GROUP_NAME: ${{ vars.AUTH_LAMBDA_LOG_GROUP_NAME }}
      AUTH_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.AUTH_LAMBDA_SECURITY_GROUP_NAME }}
      AUTH_LAMBDA_VPC_ID: ${{ vars.AUTH_LAMBDA_VPC_ID || vars.LAMBDA_VPC_ID }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME }}
      LAMBDA_VPC_ID: ${{ vars.LAMBDA_VPC_ID }}
      NOTIFICACAO_LAMBDA_ATTACH_VPC: ${{ vars.NOTIFICACAO_LAMBDA_ATTACH_VPC || 'false' }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      NOTIFICACAO_LAMBDA_LOG_GROUP_NAME: ${{ vars.NOTIFICACAO_LAMBDA_LOG_GROUP_NAME }}
      NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME }}
      NOTIFICACAO_LAMBDA_VPC_ID: ${{ vars.NOTIFICACAO_LAMBDA_VPC_ID }}
    steps:
      - name: Checkout
        if: ${{ inputs.lambda_target == 'all' || inputs.lambda_target == matrix.module }}
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: ${{ inputs.lambda_target == 'all' || inputs.lambda_target == matrix.module }}
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate workflow configuration
        if: ${{ inputs.lambda_target == 'all' || inputs.lambda_target == matrix.module }}
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub: ${name}" >&2
              exit 1
            fi
          done

          aws sts get-caller-identity >/dev/null

      - name: Cleanup Lambda resources
        if: ${{ inputs.lambda_target == 'all' || inputs.lambda_target == matrix.module }}
        shell: bash
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/cleanup-lambda.sh "${{ matrix.module }}"
