name: Cleanup Lambda Lab

on:
  workflow_dispatch:
    inputs:
      confirm_cleanup:
        description: "Digite CLEANUP para confirmar a remocao dos recursos da Lambda"
        required: true
        type: string

concurrency:
  group: lab-lambda
  cancel-in-progress: false

jobs:
  cleanup:
    if: inputs.confirm_cleanup == 'CLEANUP'
    runs-on: ubuntu-latest
    environment:
      name: lab
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      DB_PORT: ${{ vars.DB_PORT }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      LAMBDA_VPC_ID: ${{ vars.LAMBDA_VPC_ID }}
      LAMBDA_SECURITY_GROUP_NAME: ${{ vars.LAMBDA_SECURITY_GROUP_NAME }}
      LAMBDA_LOG_GROUP_NAME: ${{ vars.LAMBDA_LOG_GROUP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate workflow configuration
        shell: bash
        run: |
          required_vars=(
            AWS_REGION
            LAMBDA_FUNCTION_NAME
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Configuracao obrigatoria ausente em vars/secrets do GitHub: ${name}" >&2
              exit 1
            fi
          done

          aws sts get-caller-identity >/dev/null

      - name: Cleanup Lambda resources
        shell: bash
        run: |
          chmod +x ./scripts/cleanup-lambda.sh
          bash ./scripts/cleanup-lambda.sh
