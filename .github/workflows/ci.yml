name: Build Deploy Lambda Lab

on:
  workflow_dispatch:
    inputs:
      lambda_target:
        description: "Lambda alvo"
        required: true
        default: all
        type: choice
        options:
          - all
          - auth-lambda
          - notificacao-lambda
  push:
    branches:
      - develop
      - main

concurrency:
  group: lab-lambda
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate_develop:
    name: validate-develop
    if: github.event_name == 'push' && github.ref_name == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure scripts are executable
        run: chmod +x ./mvnw ./scripts/*.sh

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

      - name: Run unit tests
        run: ./mvnw -B test -DfailIfNoTests=false

      - name: Run integration tests
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

  open_pull_request_to_main:
    name: open-pull-request-to-main
    if: github.event_name == 'push' && github.ref_name == 'develop'
    runs-on: ubuntu-latest
    needs: validate_develop
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Open or update pull request to main
        shell: bash
        env:
          BASE_BRANCH: main
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          find_existing_pr_number() {
            local candidate_head=""
            local pr_number=""

            for candidate_head in "${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" "${HEAD_BRANCH}"; do
              pr_number="$(
                gh pr list \
                  --repo "${GITHUB_REPOSITORY}" \
                  --base "${BASE_BRANCH}" \
                  --head "${candidate_head}" \
                  --state open \
                  --json number \
                  --jq '.[0].number // empty'
              )"

              if [[ -n "${pr_number}" ]]; then
                printf '%s\n' "${pr_number}"
                return
              fi
            done
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          if [[ "${current_version}" == *-SNAPSHOT ]]; then
            echo "Nao vou abrir PR de deploy para versao SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          git fetch origin "${BASE_BRANCH}" "${HEAD_BRANCH}"
          head_ref="${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}"

          if git merge-base "origin/${BASE_BRANCH}" "origin/${HEAD_BRANCH}" >/dev/null 2>&1; then
            if git diff --quiet "origin/${BASE_BRANCH}...origin/${HEAD_BRANCH}" -- .; then
              echo "Branch ${HEAD_BRANCH} nao possui diferencas de conteudo em relacao a ${BASE_BRANCH}; PR nao sera criado."
              exit 0
            fi
          else
            echo "Branches ${BASE_BRANCH} e ${HEAD_BRANCH} ainda nao possuem merge base; seguindo para a verificacao de PR existente."
          fi

          title="chore: promover develop para main"
          body="$(printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n' \
            "PR automatico aberto apos testes unitarios, integrados e validacao de scripts." \
            "- Versao: ${current_version}" \
            "- Branch origem: ${HEAD_BRANCH}" \
            "- Branch destino: ${BASE_BRANCH}" \
            "- Commit validado: ${GITHUB_SHA}" \
            "Ao aceitar este PR, o push em main decide pelo estado atual da AWS se precisa gerar artefatos nativos e/ou criar/atualizar Lambdas.")"

          existing_pr_number="$(find_existing_pr_number)"
          if [[ -n "${existing_pr_number}" ]]; then
            gh pr edit "${existing_pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}" >/dev/null
            gh pr view "${existing_pr_number}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url'
            exit 0
          fi

          set +e
          create_output="$(
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${BASE_BRANCH}" \
              --head "${head_ref}" \
              --title "${title}" \
              --body "${body}" \
              2>&1
          )"
          create_status=$?
          set -e

          if [[ ${create_status} -eq 0 ]]; then
            echo "${create_output}"
            exit 0
          fi

          existing_pr_number="$(find_existing_pr_number)"
          if [[ -n "${existing_pr_number}" ]]; then
            gh pr view "${existing_pr_number}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url'
            exit 0
          fi

          echo "${create_output}" >&2
          exit "${create_status}"

  resolve_aws_state:
    name: resolve-aws-state
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: lab
    outputs:
      artifact_bucket: ${{ steps.state.outputs.artifact_bucket }}
      base_version: ${{ steps.state.outputs.base_version }}
      current_version: ${{ steps.state.outputs.current_version }}
      modules_to_build_csv: ${{ steps.state.outputs.modules_to_build_csv }}
      modules_to_build_json: ${{ steps.state.outputs.modules_to_build_json }}
      modules_to_deploy_csv: ${{ steps.state.outputs.modules_to_deploy_csv }}
      modules_to_deploy_json: ${{ steps.state.outputs.modules_to_deploy_json }}
      selected_modules_csv: ${{ steps.state.outputs.selected_modules_csv }}
      selected_modules_json: ${{ steps.state.outputs.selected_modules_json }}
      version_bump_required: ${{ steps.state.outputs.version_bump_required }}
      version_changed: ${{ steps.state.outputs.version_changed }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AUTH_LAMBDA_ARTIFACT_PREFIX: ${{ vars.AUTH_LAMBDA_ARTIFACT_PREFIX || vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET || vars.TERRAFORM_SHARED_DATA_BUCKET_NAME || vars.TF_STATE_BUCKET }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX: ${{ vars.NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-notificacao-lambda' }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      SHARED_INFRA_NAME: ${{ vars.SHARED_INFRA_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve build and deploy state
        id: state
        shell: bash
        env:
          LAMBDA_TARGET: ${{ inputs.lambda_target || 'all' }}
        run: |
          set -euo pipefail

          source ./scripts/lambda-modules.sh

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "${GITHUB_OUTPUT}"
          }

          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          json_array_from_csv() {
            local csv="$1"
            jq -cn --arg csv "${csv}" '($csv | split(",") | map(select(length > 0)))'
          }

          csv_from_array() {
            if [[ "$#" -eq 0 ]]; then
              printf ''
              return
            fi

            local joined=""
            printf -v joined '%s,' "$@"
            printf '%s' "${joined%,}"
          }

          resolve_artifact_bucket() {
            if [[ -n "${LAMBDA_ARTIFACT_BUCKET:-}" ]]; then
              printf '%s' "${LAMBDA_ARTIFACT_BUCKET}"
              return
            fi

            local account_id
            account_id="$(aws --region "${AWS_REGION}" sts get-caller-identity --query Account --output text)"
            printf 'tf-shared-%s-%s-%s' "${SHARED_INFRA_NAME}" "${account_id}" "${TF_STATE_REGION}"
          }

          artifact_key_prefix() {
            local module="$1"
            local prefix_var=""
            local prefix=""

            load_lambda_module "${module}"
            prefix_var="${LAMBDA_ENV_PREFIX}_LAMBDA_ARTIFACT_PREFIX"
            prefix="${!prefix_var:-${LAMBDA_ARTIFACT_PREFIX_DEFAULT}}"
            printf '%s/%s/%s' "${prefix%/}" "${LAMBDA_ARTIFACT_QUALIFIER}" "${current_version}"
          }

          object_exists() {
            local key="$1"
            local error_file
            error_file="$(mktemp)"

            if aws --region "${AWS_REGION}" s3api head-object \
              --bucket "${artifact_bucket}" \
              --key "${key}" >/dev/null 2>"${error_file}"; then
              rm -f "${error_file}"
              return 0
            fi

            if grep -Eq "Not Found|NotFound|404" "${error_file}"; then
              rm -f "${error_file}"
              return 1
            fi

            cat "${error_file}" >&2
            rm -f "${error_file}"
            exit 1
          }

          module_artifact_exists() {
            local module="$1"
            local key_prefix=""
            local named_artifact=""

            load_lambda_module "${module}"
            key_prefix="$(artifact_key_prefix "${module}")"
            named_artifact="${LAMBDA_NAMED_ARTIFACT_FILENAME}"

            object_exists "${key_prefix}/function.zip" &&
              object_exists "${key_prefix}/${named_artifact}"
          }

          lambda_function_name() {
            local module="$1"
            local function_var=""

            load_lambda_module "${module}"
            function_var="${LAMBDA_ENV_PREFIX}_LAMBDA_FUNCTION_NAME"
            printf '%s' "${!function_var:-${LAMBDA_FUNCTION_NAME_DEFAULT}}"
          }

          lambda_deployed_version() {
            local function_name="$1"

            aws --region "${AWS_REGION}" lambda get-function-configuration \
              --function-name "${function_name}" \
              --query 'Environment.Variables.OFICINA_LAMBDA_ARTIFACT_VERSION' \
              --output text 2>/dev/null || true
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          if [[ "${current_version}" == *-SNAPSHOT ]]; then
            echo "A versao fechada da Lambda em main nao pode ser SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          base_version=""
          version_changed="false"
          base_ref=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
            if git show "${base_ref}:pom.xml" > /tmp/base-pom.xml 2>/dev/null; then
              base_version="$(extract_version /tmp/base-pom.xml)"
              if [[ "${current_version}" != "${base_version}" ]]; then
                version_changed="true"
              fi
            else
              version_changed="true"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version_changed="true"
          fi

          selected_modules=()
          case "${LAMBDA_TARGET}" in
            all)
              while IFS= read -r module; do
                selected_modules+=("${module}")
              done < <(all_lambda_modules)
              ;;
            auth-lambda|notificacao-lambda)
              selected_modules+=("${LAMBDA_TARGET}")
              ;;
            *)
              echo "Lambda alvo invalido: ${LAMBDA_TARGET}" >&2
              exit 1
              ;;
          esac

          artifact_bucket="$(resolve_artifact_bucket)"
          if ! aws --region "${AWS_REGION}" s3api head-bucket --bucket "${artifact_bucket}" >/dev/null 2>&1; then
            echo "Bucket de artefatos ${artifact_bucket} nao existe ou nao esta acessivel. Aplique a infra compartilhada antes do build/deploy das Lambdas." >&2
            exit 1
          fi

          modules_to_build=()
          modules_to_deploy=()
          modules_requiring_version_bump=()

          for module in "${selected_modules[@]}"; do
            load_lambda_module "${module}"
            function_name="$(lambda_function_name "${module}")"
            key_prefix="$(artifact_key_prefix "${module}")"
            artifact_exists="false"
            function_exists="false"
            deployed_version=""
            need_build="false"
            need_deploy="false"

            if module_artifact_exists "${module}"; then
              artifact_exists="true"
            else
              need_build="true"
            fi

            if aws --region "${AWS_REGION}" lambda get-function \
              --function-name "${function_name}" >/dev/null 2>&1; then
              function_exists="true"
              deployed_version="$(lambda_deployed_version "${function_name}")"
              if [[ "${deployed_version}" == "None" ]]; then
                deployed_version=""
              fi
            fi

            if [[ "${function_exists}" != "true" || "${deployed_version}" != "${current_version}" || "${need_build}" == "true" ]]; then
              need_deploy="true"
            fi

            if [[ "${need_build}" == "true" ]]; then
              modules_to_build+=("${module}")

              if [[ "${function_exists}" == "true" ]]; then
                modules_requiring_version_bump+=("${module}")
              fi
            fi

            if [[ "${need_deploy}" == "true" ]]; then
              modules_to_deploy+=("${module}")
            fi

            printf '%s\n' \
              "Modulo: ${module}" \
              "  Bucket: ${artifact_bucket}" \
              "  Prefixo: ${key_prefix}" \
              "  Artefato existe: ${artifact_exists}" \
              "  Lambda: ${function_name}" \
              "  Lambda existe: ${function_exists}" \
              "  Versao na Lambda: ${deployed_version:-<ausente>}" \
              "  Build necessario: ${need_build}" \
              "  Deploy necessario: ${need_deploy}"
          done

          modules_to_build_csv="$(csv_from_array "${modules_to_build[@]}")"
          modules_to_deploy_csv="$(csv_from_array "${modules_to_deploy[@]}")"
          modules_requiring_version_bump_csv="$(csv_from_array "${modules_requiring_version_bump[@]}")"
          selected_modules_csv="$(csv_from_array "${selected_modules[@]}")"
          version_bump_required="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" && -n "${modules_requiring_version_bump_csv}" && "${version_changed}" != "true" ]]; then
            version_bump_required="true"
          fi

          set_output artifact_bucket "${artifact_bucket}"
          set_output base_version "${base_version}"
          set_output current_version "${current_version}"
          set_output modules_to_build_csv "${modules_to_build_csv}"
          set_output modules_to_build_json "$(json_array_from_csv "${modules_to_build_csv}")"
          set_output modules_to_deploy_csv "${modules_to_deploy_csv}"
          set_output modules_to_deploy_json "$(json_array_from_csv "${modules_to_deploy_csv}")"
          set_output selected_modules_csv "${selected_modules_csv}"
          set_output selected_modules_json "$(json_array_from_csv "${selected_modules_csv}")"
          set_output version_bump_required "${version_bump_required}"
          set_output version_changed "${version_changed}"

          printf 'Versao base: %s\n' "${base_version:-<indisponivel>}"
          printf 'Versao atual: %s\n' "${current_version}"
          printf 'Mudanca de versao: %s\n' "${version_changed}"
          printf 'Modulos selecionados: %s\n' "${selected_modules_csv}"
          printf 'Modulos para build: %s\n' "${modules_to_build_csv:-<nenhum>}"
          printf 'Modulos para deploy: %s\n' "${modules_to_deploy_csv:-<nenhum>}"
          printf 'Modulos que exigem incremento de versao: %s\n' "${modules_requiring_version_bump_csv:-<nenhum>}"

  require_version_bump:
    name: require-version-bump
    if: github.ref_name == 'main' && needs.resolve_aws_state.outputs.version_bump_required == 'true'
    runs-on: ubuntu-latest
    needs: resolve_aws_state
    steps:
      - name: Stop duplicate build
        shell: bash
        run: |
          printf '%s\n%s\n%s\n' \
            "O estado da AWS exige novo build nativo para Lambda ja existente na versao ${{ needs.resolve_aws_state.outputs.current_version }}, mas o push em main nao incrementou project.version." \
            "Versao base: ${{ needs.resolve_aws_state.outputs.base_version || '<indisponivel>' }}" \
            "Incremente a versao no pom.xml antes de publicar novos artefatos versionados." >&2
          exit 1

  build_native_artifacts:
    name: build-native-artifacts
    if: github.ref_name == 'main' && needs.resolve_aws_state.outputs.version_bump_required != 'true' && needs.resolve_aws_state.outputs.modules_to_build_csv != ''
    runs-on: ubuntu-latest
    needs: resolve_aws_state
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AUTH_LAMBDA_ARTIFACT_PREFIX: ${{ vars.AUTH_LAMBDA_ARTIFACT_PREFIX || vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ needs.resolve_aws_state.outputs.artifact_bucket }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_RELEASE_VERSION: ${{ needs.resolve_aws_state.outputs.current_version }}
      NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX: ${{ vars.NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-notificacao-lambda' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Ensure scripts are executable
        run: chmod +x ./mvnw ./scripts/*.sh

      - name: Build and store missing native artifacts
        shell: bash
        env:
          MODULES_TO_BUILD: ${{ needs.resolve_aws_state.outputs.modules_to_build_csv }}
        run: |
          set -euo pipefail

          for module in ${MODULES_TO_BUILD//,/ }; do
            ./scripts/build-native-lambda.sh "${module}" -B -DskipTests -DskipITs=true -DfailIfNoTests=false
            ./scripts/s3-native-lambda-artifact.sh "${module}" store
          done

      - name: Upload native packages
        uses: actions/upload-artifact@v6
        with:
          name: lambda-native-packages
          path: |
            auth-lambda/target/*.zip
            notificacao-lambda/target/*.zip
          if-no-files-found: warn

  deploy_lambda:
    name: deploy-lambda
    if: >
      always() &&
      github.ref_name == 'main' &&
      needs.resolve_aws_state.outputs.version_bump_required != 'true' &&
      needs.resolve_aws_state.outputs.modules_to_deploy_csv != '' &&
      (
        needs.build_native_artifacts.result == 'success' ||
        needs.build_native_artifacts.result == 'skipped'
      )
    runs-on: ubuntu-latest
    needs:
      - resolve_aws_state
      - build_native_artifacts
    strategy:
      fail-fast: false
      matrix:
        module:
          - auth-lambda
          - notificacao-lambda
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE || 'require' }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      MASTER_SECRET_ARN: ${{ vars.MASTER_SECRET_ARN }}
      MASTER_DB_USER: ${{ vars.MASTER_DB_USER }}
      MASTER_DB_PASSWORD: ${{ secrets.MASTER_DB_PASSWORD }}
      BOOTSTRAP_AUTH_DB_USER: ${{ vars.BOOTSTRAP_AUTH_DB_USER || 'true' }}
      AUTH_DB_USER: ${{ vars.AUTH_DB_USER || 'oficina_auth_lambda' }}
      AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
      AUTH_DB_ALLOW_SCHEMA_CHANGES: ${{ vars.AUTH_DB_ALLOW_SCHEMA_CHANGES || 'false' }}
      STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER: ${{ vars.STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER || 'true' }}
      AUTH_DB_SECRET_NAME: ${{ vars.AUTH_DB_SECRET_NAME || 'oficina/lab/database/auth-lambda' }}
      AUTH_DB_SECRET_KMS_KEY_ID: ${{ vars.AUTH_DB_SECRET_KMS_KEY_ID }}
      ROTATE_AUTH_DB_PASSWORD: ${{ vars.ROTATE_AUTH_DB_PASSWORD || 'false' }}
      AUTO_ALLOW_DEPLOY_RUNNER_CIDR: ${{ vars.AUTO_ALLOW_DEPLOY_RUNNER_CIDR || 'true' }}
      CI_RUNNER_PUBLIC_IP_URL: ${{ vars.CI_RUNNER_PUBLIC_IP_URL || 'https://checkip.amazonaws.com' }}
      AUTH_LAMBDA_ATTACH_VPC: ${{ vars.AUTH_LAMBDA_ATTACH_VPC || 'true' }}
      AUTH_LAMBDA_ARTIFACT_PREFIX: ${{ vars.AUTH_LAMBDA_ARTIFACT_PREFIX || vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      AUTH_LAMBDA_EXTRA_ENV_JSON: ${{ vars.AUTH_LAMBDA_EXTRA_ENV_JSON || '{}' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      AUTH_LAMBDA_ROLE_ARN: ${{ secrets.AUTH_LAMBDA_ROLE_ARN || secrets.LAMBDA_ROLE_ARN }}
      AUTH_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.AUTH_LAMBDA_SECURITY_GROUP_NAME }}
      AUTH_LAMBDA_SUBNET_IDS: ${{ vars.AUTH_LAMBDA_SUBNET_IDS || vars.LAMBDA_SUBNET_IDS }}
      AUTH_LAMBDA_TIMEOUT: ${{ vars.AUTH_LAMBDA_TIMEOUT || vars.LAMBDA_TIMEOUT || '15' }}
      AUTH_LAMBDA_VPC_ID: ${{ vars.AUTH_LAMBDA_VPC_ID || vars.LAMBDA_VPC_ID }}
      AUTH_API_GATEWAY_ID: ${{ vars.AUTH_API_GATEWAY_ID || vars.API_GATEWAY_ID }}
      AUTH_API_GATEWAY_NAME: ${{ vars.AUTH_API_GATEWAY_NAME || vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      AUTH_API_GATEWAY_ROUTE_KEY: ${{ vars.AUTH_API_GATEWAY_ROUTE_KEY || 'POST /auth' }}
      AUTH_API_GATEWAY_ROUTE_KEYS: ${{ vars.AUTH_API_GATEWAY_ROUTE_KEYS || 'POST /auth;POST /auth/token;GET /.well-known/openid-configuration;GET /.well-known/jwks.json' }}
      ATTACH_API_GATEWAY: ${{ vars.ATTACH_API_GATEWAY || 'true' }}
      API_GATEWAY_PAYLOAD_FORMAT_VERSION: ${{ vars.API_GATEWAY_PAYLOAD_FORMAT_VERSION || '2.0' }}
      API_GATEWAY_TIMEOUT_MILLISECONDS: ${{ vars.API_GATEWAY_TIMEOUT_MILLISECONDS || '30000' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ needs.resolve_aws_state.outputs.artifact_bucket }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '256' }}
      LAMBDA_RELEASE_VERSION: ${{ needs.resolve_aws_state.outputs.current_version }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'provided.al2023' }}
      LAMBDA_SECRET_INJECTION_MODE: ${{ vars.LAMBDA_SECRET_INJECTION_MODE || 'env-vars' }}
      MP_JWT_VERIFY_PUBLICKEY: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY }}
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY_LOCATION }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      JWT_SECRET_KMS_KEY_ID: ${{ vars.JWT_SECRET_KMS_KEY_ID }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      NOTIFICACAO_LAMBDA_ATTACH_VPC: ${{ vars.NOTIFICACAO_LAMBDA_ATTACH_VPC || 'true' }}
      NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX: ${{ vars.NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-notificacao-lambda' }}
      NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON: ${{ secrets.NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON || vars.NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON || '{"QUARKUS_MAILER_FROM":"noreply@oficina.local","QUARKUS_MAILER_PORT":"1025","QUARKUS_MAILER_TLS":"false","QUARKUS_MAILER_START_TLS":"DISABLED"}' }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      NOTIFICACAO_LAMBDA_ROLE_ARN: ${{ secrets.NOTIFICACAO_LAMBDA_ROLE_ARN || secrets.LAMBDA_ROLE_ARN }}
      NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME || format('{0}-notificacao-lambda', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      NOTIFICACAO_LAMBDA_SUBNET_IDS: ${{ vars.NOTIFICACAO_LAMBDA_SUBNET_IDS }}
      NOTIFICACAO_LAMBDA_TIMEOUT: ${{ vars.NOTIFICACAO_LAMBDA_TIMEOUT || vars.LAMBDA_TIMEOUT || '15' }}
      NOTIFICACAO_LAMBDA_VPC_ID: ${{ vars.NOTIFICACAO_LAMBDA_VPC_ID }}
      NOTIFICACAO_API_GATEWAY_ID: ${{ vars.NOTIFICACAO_API_GATEWAY_ID || vars.API_GATEWAY_ID }}
      NOTIFICACAO_API_GATEWAY_NAME: ${{ vars.NOTIFICACAO_API_GATEWAY_NAME || vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      NOTIFICACAO_API_GATEWAY_ROUTE_KEY: ${{ vars.NOTIFICACAO_API_GATEWAY_ROUTE_KEY || 'POST /notificacoes/email' }}
      NOTIFICACAO_API_GATEWAY_ROUTE_KEYS: ${{ vars.NOTIFICACAO_API_GATEWAY_ROUTE_KEYS || 'POST /notificacoes/email' }}
      OFICINA_AUTH_AUDIENCE: ${{ vars.OFICINA_AUTH_AUDIENCE || 'oficina-app' }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER }}
      OFICINA_AUTH_KEY_ID: ${{ vars.OFICINA_AUTH_KEY_ID || 'oficina-lab-rsa' }}
      OFICINA_AUTH_SCOPE: ${{ vars.OFICINA_AUTH_SCOPE || 'oficina-app' }}
      QUARKUS_DATASOURCE_JDBC_URL: ${{ secrets.QUARKUS_DATASOURCE_JDBC_URL }}
      QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.QUARKUS_DATASOURCE_PASSWORD }}
      QUARKUS_DATASOURCE_USERNAME: ${{ secrets.QUARKUS_DATASOURCE_USERNAME }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
      SMALLRYE_JWT_SIGN_KEY: ${{ secrets.SMALLRYE_JWT_SIGN_KEY }}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: ${{ secrets.SMALLRYE_JWT_SIGN_KEY_LOCATION }}
    steps:
      - name: Checkout
        if: contains(fromJson(needs.resolve_aws_state.outputs.modules_to_deploy_json), matrix.module)
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: contains(fromJson(needs.resolve_aws_state.outputs.modules_to_deploy_json), matrix.module)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Restore native artifact from S3
        if: contains(fromJson(needs.resolve_aws_state.outputs.modules_to_deploy_json), matrix.module)
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/s3-native-lambda-artifact.sh "${{ matrix.module }}" restore

      - name: Deploy native Lambda
        if: contains(fromJson(needs.resolve_aws_state.outputs.modules_to_deploy_json), matrix.module)
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/deploy-native-lambda.sh "${{ matrix.module }}"

  report_noop:
    name: report-noop
    if: >
      github.ref_name == 'main' &&
      needs.resolve_aws_state.outputs.version_bump_required != 'true' &&
      needs.resolve_aws_state.outputs.modules_to_build_csv == '' &&
      needs.resolve_aws_state.outputs.modules_to_deploy_csv == ''
    runs-on: ubuntu-latest
    needs: resolve_aws_state
    steps:
      - name: Report no-op
        run: |
          echo "Artefatos da versao ${{ needs.resolve_aws_state.outputs.current_version }} e Lambdas selecionadas ja estao alinhados na AWS."
