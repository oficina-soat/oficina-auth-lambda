name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - closed
  push:
    branches:
      - develop

concurrency:
  group: lab-lambda
  cancel-in-progress: false

jobs:
  detect_lambda_version:
    name: detect-lambda-version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    permissions:
      contents: read
    outputs:
      base_version: ${{ steps.version.outputs.base_version }}
      current_version: ${{ steps.version.outputs.current_version }}
      deploy_needed: ${{ steps.version.outputs.deploy_needed }}
      release_asset: ${{ steps.version.outputs.release_asset }}
      release_exists: ${{ steps.version.outputs.release_exists }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}
    env:
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Lambda version change
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          base_version=""
          version_changed="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if git show "${{ github.event.before }}:pom.xml" > /tmp/base-pom.xml 2>/dev/null; then
              base_version="$(extract_version /tmp/base-pom.xml)"
              if [[ "${current_version}" != "${base_version}" ]]; then
                version_changed="true"
              fi
            else
              version_changed="true"
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            version_changed="true"
          fi

          release_tag="v${current_version}"
          release_asset="oficina-auth-lambda-${current_version}-${LAMBDA_ARCHITECTURE}.zip"
          release_exists="false"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_exists="true"
          fi

          deploy_needed="false"
          if [[ "${release_exists}" == "false" ]]; then
            deploy_needed="true"
          fi

          if [[ "${{ github.ref_name }}" == "main" && "${deploy_needed}" == "true" && "${current_version}" == *-SNAPSHOT ]]; then
            echo "A versao fechada da Lambda em main nao pode ser SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          if [[ "${{ github.ref_name }}" == "main" && "${version_changed}" == "true" && "${release_exists}" == "true" ]]; then
            echo "A release ${release_tag} ja existe. Incremente a versao da Lambda antes de gerar novo pacote." >&2
            exit 1
          fi

          {
            echo "base_version=${base_version}"
            echo "current_version=${current_version}"
            echo "deploy_needed=${deploy_needed}"
            echo "release_asset=${release_asset}"
            echo "release_exists=${release_exists}"
            echo "release_tag=${release_tag}"
            echo "version_changed=${version_changed}"
          } >> "${GITHUB_OUTPUT}"

          echo "Versao base: ${base_version:-<indisponivel>}"
          echo "Versao atual: ${current_version}"
          echo "Mudanca de versao: ${version_changed}"
          echo "Deploy necessario: ${deploy_needed}"
          echo "Release alvo: ${release_tag}"
          echo "Release existente: ${release_exists}"

  build_and_unit_tests:
    name: build-and-unit-tests
    runs-on: ubuntu-latest
    needs: detect_lambda_version
    if: >
      needs.detect_lambda_version.outputs.deploy_needed == 'true' &&
      (github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Build application and run unit tests
        run: ./mvnw -B clean package -DskipITs=true -DfailIfNoTests=false

  integration_tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs:
      - detect_lambda_version
      - build_and_unit_tests
    if: >
      needs.detect_lambda_version.outputs.deploy_needed == 'true' &&
      (github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Run integration tests
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

  create_deploy_pull_request:
    name: create-deploy-pull-request
    runs-on: ubuntu-latest
    needs:
      - detect_lambda_version
      - integration_tests
    if: >
      github.event_name == 'push' &&
      github.ref_name == 'develop' &&
      needs.detect_lambda_version.outputs.deploy_needed == 'true'
    permissions:
      contents: read
      pull-requests: write
    env:
      CURRENT_VERSION: ${{ needs.detect_lambda_version.outputs.current_version }}
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.detect_lambda_version.outputs.release_tag }}
    steps:
      - name: Create or update deploy pull request
        shell: bash
        run: |
          if [[ "${CURRENT_VERSION}" == *-SNAPSHOT ]]; then
            echo "Nao vou abrir PR de deploy para versao SNAPSHOT: ${CURRENT_VERSION}" >&2
            exit 1
          fi

          title="Deploy oficina-auth-lambda ${RELEASE_TAG}"
          body="$(printf '%s\n\n%s\n%s\n%s\n%s\n\n%s\n' \
            "Deploy automatico preparado pelo CI apos testes unitarios e integrados." \
            "- Versao: ${CURRENT_VERSION}" \
            "- Release alvo: ${RELEASE_TAG}" \
            "- Branch origem: ${GITHUB_REF_NAME}" \
            "- Commit validado: ${GITHUB_SHA}" \
            "Ao aceitar este PR, o merge em main executa build nativo, release e deploy.")"

          pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${GITHUB_REF_NAME}" \
            --state open \
            --json number \
            --jq '.[0].number // ""')"

          if [[ -n "${pr_number}" ]]; then
            gh pr edit "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
            echo "PR de deploy atualizado: #${pr_number}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${GITHUB_REF_NAME}" \
              --title "${title}" \
              --body "${body}"
          fi

  build_native_lambda:
    name: build-native-lambda
    runs-on: ubuntu-latest
    needs:
      - detect_lambda_version
      - integration_tests
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      needs.detect_lambda_version.outputs.deploy_needed == 'true' &&
      needs.integration_tests.result == 'skipped'
    permissions:
      contents: write
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET || vars.TF_STATE_BUCKET }}
      LAMBDA_ARTIFACT_PREFIX: ${{ vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_VERSION: ${{ needs.detect_lambda_version.outputs.current_version }}
      LAMBDA_RELEASE_ASSET: ${{ needs.detect_lambda_version.outputs.release_asset }}
      LAMBDA_RELEASE_TAG: ${{ needs.detect_lambda_version.outputs.release_tag }}
      LAMBDA_RELEASE_VERSION: ${{ needs.detect_lambda_version.outputs.current_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${LAMBDA_RELEASE_VERSION}" == *-SNAPSHOT ]]; then
            echo "A versao fechada da Lambda nao pode ser SNAPSHOT: ${LAMBDA_RELEASE_VERSION}" >&2
            exit 1
          fi

          if gh release view "${LAMBDA_RELEASE_TAG}" >/dev/null 2>&1; then
            echo "A release ${LAMBDA_RELEASE_TAG} ja existe. Incremente a versao da Lambda antes de gerar novo pacote." >&2
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure build scripts are executable
        run: |
          chmod +x ./mvnw
          chmod +x ./scripts/build-native-lambda.sh
          chmod +x ./scripts/s3-native-lambda-artifact.sh

      - name: Build native Lambda package
        run: ./scripts/build-native-lambda.sh -B -DskipTests -DskipITs=true -DfailIfNoTests=false

      - name: Prepare GitHub release asset
        shell: bash
        run: |
          cp target/function.zip "target/${LAMBDA_RELEASE_ASSET}"
          sha256sum "target/${LAMBDA_RELEASE_ASSET}" > target/checksums.txt

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${LAMBDA_RELEASE_TAG}" \
            "target/${LAMBDA_RELEASE_ASSET}" \
            target/checksums.txt \
            --target "${GITHUB_SHA}" \
            --title "${LAMBDA_RELEASE_TAG}" \
            --notes "Lambda nativa oficina-auth-lambda ${LAMBDA_RELEASE_VERSION} (${LAMBDA_ARCHITECTURE})."

      - name: Download Lambda package from GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf target/github-release
          mkdir -p target/github-release
          gh release download "${LAMBDA_RELEASE_TAG}" \
            --pattern "${LAMBDA_RELEASE_ASSET}" \
            --dir target/github-release \
            --clobber
          cmp "target/${LAMBDA_RELEASE_ASSET}" "target/github-release/${LAMBDA_RELEASE_ASSET}"
          cp "target/github-release/${LAMBDA_RELEASE_ASSET}" target/function.zip
          cp "target/github-release/${LAMBDA_RELEASE_ASSET}" target/oficina-auth-lambda-native.zip

      - name: Configure AWS credentials
        if: env.LAMBDA_ARTIFACT_BUCKET != ''
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Store GitHub release package in S3
        if: env.LAMBDA_ARTIFACT_BUCKET != ''
        run: ./scripts/s3-native-lambda-artifact.sh store

      - name: Skip S3 native package store
        if: env.LAMBDA_ARTIFACT_BUCKET == ''
        run: echo "LAMBDA_ARTIFACT_BUCKET/TF_STATE_BUCKET ausente; pacote ficou somente no GitHub Release."

      - name: Upload Lambda package
        uses: actions/upload-artifact@v6
        with:
          name: lambda-native-package
          path: |
            target/function.zip
            target/oficina-auth-lambda-native.zip
            target/${{ needs.detect_lambda_version.outputs.release_asset }}
            target/checksums.txt
          if-no-files-found: error

  deploy_lambda:
    name: deploy-lambda
    runs-on: ubuntu-latest
    needs:
      - detect_lambda_version
      - build_native_lambda
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      needs.detect_lambda_version.outputs.deploy_needed == 'true'
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE || 'require' }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      MASTER_SECRET_ARN: ${{ vars.MASTER_SECRET_ARN }}
      MASTER_DB_USER: ${{ vars.MASTER_DB_USER }}
      MASTER_DB_PASSWORD: ${{ secrets.MASTER_DB_PASSWORD }}
      BOOTSTRAP_AUTH_DB_USER: ${{ vars.BOOTSTRAP_AUTH_DB_USER || 'true' }}
      AUTH_DB_USER: ${{ vars.AUTH_DB_USER || 'oficina_auth_lambda' }}
      AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
      AUTH_DB_ALLOW_SCHEMA_CHANGES: ${{ vars.AUTH_DB_ALLOW_SCHEMA_CHANGES || 'false' }}
      STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER: ${{ vars.STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER || 'true' }}
      AUTH_DB_SECRET_NAME: ${{ vars.AUTH_DB_SECRET_NAME || 'oficina/lab/database/auth-lambda' }}
      AUTH_DB_SECRET_KMS_KEY_ID: ${{ vars.AUTH_DB_SECRET_KMS_KEY_ID }}
      ROTATE_AUTH_DB_PASSWORD: ${{ vars.ROTATE_AUTH_DB_PASSWORD || 'false' }}
      AUTO_ALLOW_DEPLOY_RUNNER_CIDR: ${{ vars.AUTO_ALLOW_DEPLOY_RUNNER_CIDR || 'true' }}
      CI_RUNNER_PUBLIC_IP_URL: ${{ vars.CI_RUNNER_PUBLIC_IP_URL || 'https://checkip.amazonaws.com' }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'provided.al2023' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '256' }}
      LAMBDA_TIMEOUT: ${{ vars.LAMBDA_TIMEOUT || '15' }}
      LAMBDA_VPC_ID: ${{ vars.LAMBDA_VPC_ID }}
      LAMBDA_SUBNET_IDS: ${{ vars.LAMBDA_SUBNET_IDS }}
      LAMBDA_SECURITY_GROUP_NAME: ${{ vars.LAMBDA_SECURITY_GROUP_NAME }}
      ATTACH_API_GATEWAY: ${{ vars.ATTACH_API_GATEWAY || 'true' }}
      API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID }}
      API_GATEWAY_NAME: ${{ vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      API_GATEWAY_ROUTE_KEY: ${{ vars.API_GATEWAY_ROUTE_KEY || 'POST /auth' }}
      API_GATEWAY_PAYLOAD_FORMAT_VERSION: ${{ vars.API_GATEWAY_PAYLOAD_FORMAT_VERSION || '2.0' }}
      API_GATEWAY_TIMEOUT_MILLISECONDS: ${{ vars.API_GATEWAY_TIMEOUT_MILLISECONDS || '30000' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
      QUARKUS_DATASOURCE_USERNAME: ${{ secrets.QUARKUS_DATASOURCE_USERNAME }}
      QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.QUARKUS_DATASOURCE_PASSWORD }}
      QUARKUS_DATASOURCE_JDBC_URL: ${{ secrets.QUARKUS_DATASOURCE_JDBC_URL }}
      MP_JWT_VERIFY_PUBLICKEY: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY }}
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY_LOCATION }}
      SMALLRYE_JWT_SIGN_KEY: ${{ secrets.SMALLRYE_JWT_SIGN_KEY }}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: ${{ secrets.SMALLRYE_JWT_SIGN_KEY_LOCATION }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      JWT_SECRET_KMS_KEY_ID: ${{ vars.JWT_SECRET_KMS_KEY_ID }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Lambda package
        uses: actions/download-artifact@v7
        with:
          name: lambda-native-package
          path: target

      - name: Validate deploy inputs
        run: |
          missing=()
          [[ -n "${AWS_ACCESS_KEY_ID}" ]] || missing+=("AWS_ACCESS_KEY_ID")
          [[ -n "${AWS_SECRET_ACCESS_KEY}" ]] || missing+=("AWS_SECRET_ACCESS_KEY")
          [[ -n "${LAMBDA_FUNCTION_NAME}" ]] || missing+=("LAMBDA_FUNCTION_NAME")
          [[ "${ATTACH_API_GATEWAY}" != "true" || -n "${API_GATEWAY_ID}" || -n "${API_GATEWAY_NAME}" ]] || missing+=("API_GATEWAY_ID|API_GATEWAY_NAME")
          [[ "${ATTACH_API_GATEWAY}" != "true" || -n "${API_GATEWAY_ROUTE_KEY}" ]] || missing+=("API_GATEWAY_ROUTE_KEY")

          if [[ "${BOOTSTRAP_AUTH_DB_USER}" != "true" ]]; then
            [[ -n "${QUARKUS_DATASOURCE_USERNAME}" ]] || missing+=("QUARKUS_DATASOURCE_USERNAME")
            [[ -n "${QUARKUS_DATASOURCE_PASSWORD}" ]] || missing+=("QUARKUS_DATASOURCE_PASSWORD")
          fi

          if [[ "${JWT_SECRET_SOURCE}" == "env-vars" && -z "${MP_JWT_VERIFY_PUBLICKEY}" && -z "${MP_JWT_VERIFY_PUBLICKEY_LOCATION}" ]]; then
            missing+=("MP_JWT_VERIFY_PUBLICKEY|MP_JWT_VERIFY_PUBLICKEY_LOCATION")
          fi

          if [[ "${JWT_SECRET_SOURCE}" == "env-vars" && -z "${SMALLRYE_JWT_SIGN_KEY}" && -z "${SMALLRYE_JWT_SIGN_KEY_LOCATION}" ]]; then
            missing+=("SMALLRYE_JWT_SIGN_KEY|SMALLRYE_JWT_SIGN_KEY_LOCATION")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing GitHub Environment values for environment 'lab': ${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy native Lambda
        run: |
          chmod +x ./scripts/deploy-native-lambda.sh
          ./scripts/deploy-native-lambda.sh
