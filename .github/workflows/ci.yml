name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

concurrency:
  group: lab-lambda
  cancel-in-progress: false

jobs:
  detect_release_state:
    name: detect-release-state
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      auth_lambda_impacted: ${{ steps.detect.outputs.auth_lambda_impacted }}
      auth_release_asset: ${{ steps.detect.outputs.auth_release_asset }}
      base_version: ${{ steps.detect.outputs.base_version }}
      current_version: ${{ steps.detect.outputs.current_version }}
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      impacted_modules_csv: ${{ steps.detect.outputs.impacted_modules_csv }}
      impacted_modules_json: ${{ steps.detect.outputs.impacted_modules_json }}
      notificacao_lambda_impacted: ${{ steps.detect.outputs.notificacao_lambda_impacted }}
      notificacao_release_asset: ${{ steps.detect.outputs.notificacao_release_asset }}
      release_exists: ${{ steps.detect.outputs.release_exists }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      version_changed: ${{ steps.detect.outputs.version_changed }}
    env:
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect release state and module impacts
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source ./scripts/lambda-modules.sh

          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          base_version=""
          version_changed="false"
          base_ref=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
            if git show "${base_ref}:pom.xml" > /tmp/base-pom.xml 2>/dev/null; then
              base_version="$(extract_version /tmp/base-pom.xml)"
              if [[ "${current_version}" != "${base_version}" ]]; then
                version_changed="true"
              fi
            else
              version_changed="true"
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            version_changed="true"
          fi

          ./scripts/detect-lambda-impacts.sh "${base_ref}" HEAD

          release_tag="v${current_version}"
          auth_release_asset="$(lambda_release_asset_name auth-lambda "${current_version}" "${LAMBDA_ARCHITECTURE}")"
          notificacao_release_asset="$(lambda_release_asset_name notificacao-lambda "${current_version}" "${LAMBDA_ARCHITECTURE}")"
          release_exists="false"
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_exists="true"
          fi

          deploy_needed="false"
          if [[ "${release_exists}" == "false" ]]; then
            deploy_needed="true"
          fi

          if [[ "${{ github.ref_name }}" == "main" && "${deploy_needed}" == "true" && "${current_version}" == *-SNAPSHOT ]]; then
            echo "A versao fechada da release em main nao pode ser SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          if [[ "${{ github.ref_name }}" == "main" && "${version_changed}" == "true" && "${release_exists}" == "true" ]]; then
            echo "A release ${release_tag} ja existe. Incremente a versao antes de gerar novos artefatos." >&2
            exit 1
          fi

          {
            echo "base_version=${base_version}"
            echo "current_version=${current_version}"
            echo "deploy_needed=${deploy_needed}"
            echo "auth_release_asset=${auth_release_asset}"
            echo "notificacao_release_asset=${notificacao_release_asset}"
            echo "release_exists=${release_exists}"
            echo "release_tag=${release_tag}"
            echo "version_changed=${version_changed}"
          } >> "${GITHUB_OUTPUT}"

          echo "Versao base: ${base_version:-<indisponivel>}"
          echo "Versao atual: ${current_version}"
          echo "Mudanca de versao: ${version_changed}"
          echo "Deploy necessario: ${deploy_needed}"
          echo "Release alvo: ${release_tag}"
          echo "Release existente: ${release_exists}"

  build_and_unit_tests:
    name: build-and-unit-tests
    runs-on: ubuntu-latest
    needs: detect_release_state
    if: >
      needs.detect_release_state.outputs.deploy_needed == 'true' &&
      (github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Run unit tests
        run: ./mvnw -B test -DfailIfNoTests=false

  integration_tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs:
      - detect_release_state
      - build_and_unit_tests
    if: >
      needs.detect_release_state.outputs.deploy_needed == 'true' &&
      (github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Run integration tests
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

  validate_scripts:
    name: validate-scripts
    runs-on: ubuntu-latest
    needs: detect_release_state
    if: >
      needs.detect_release_state.outputs.deploy_needed == 'true' &&
      (github.ref_name == 'develop' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate shell scripts
        run: bash -n scripts/*.sh

  create_deploy_pull_request:
    name: create-deploy-pull-request
    runs-on: ubuntu-latest
    needs:
      - detect_release_state
      - integration_tests
      - validate_scripts
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'develop' &&
      needs.detect_release_state.result == 'success' &&
      (
        needs.detect_release_state.outputs.deploy_needed != 'true' ||
        (
          needs.integration_tests.result == 'success' &&
          needs.validate_scripts.result == 'success'
        )
      )
    permissions:
      contents: read
      pull-requests: write
    env:
      CURRENT_VERSION: ${{ needs.detect_release_state.outputs.current_version }}
      DEPLOY_NEEDED: ${{ needs.detect_release_state.outputs.deploy_needed }}
      GH_TOKEN: ${{ github.token }}
      IMPACTED_MODULES: ${{ needs.detect_release_state.outputs.impacted_modules_csv }}
      RELEASE_EXISTS: ${{ needs.detect_release_state.outputs.release_exists }}
      RELEASE_TAG: ${{ needs.detect_release_state.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create or update deploy pull request
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
          BASE_BRANCH: main
        run: |
          if [[ "${BASE_BRANCH}" == "${HEAD_BRANCH}" ]]; then
            echo "Branch base e branch origem do PR de deploy nao podem ser iguais: ${BASE_BRANCH}" >&2
            exit 1
          fi

          if [[ "${HEAD_BRANCH}" != "develop" ]]; then
            echo "Este job so pode criar PR a partir de develop; ref atual: ${HEAD_BRANCH}" >&2
            exit 1
          fi

          if [[ "${CURRENT_VERSION}" == *-SNAPSHOT ]]; then
            echo "Nao vou abrir PR de deploy para versao SNAPSHOT: ${CURRENT_VERSION}" >&2
            exit 1
          fi

          git fetch origin "${BASE_BRANCH}" "${HEAD_BRANCH}"
          head_ref="${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}"

          if git diff --quiet "origin/${BASE_BRANCH}...origin/${HEAD_BRANCH}" -- .; then
            echo "Branch ${HEAD_BRANCH} nao possui diferencas de conteudo em relacao a ${BASE_BRANCH}; PR nao sera criado."
            exit 0
          fi

          if [[ "${DEPLOY_NEEDED}" == "true" ]]; then
            title="Deploy lambdas Oficina ${RELEASE_TAG}"
            body="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
              "Deploy automatico preparado pelo CI apos testes e validacao de scripts." \
              "- Versao: ${CURRENT_VERSION}" \
              "- Release alvo: ${RELEASE_TAG}" \
              "- Release existente: ${RELEASE_EXISTS}" \
              "- Modulos impactados: ${IMPACTED_MODULES:-<nenhum>}" \
              "- Branch destino: ${BASE_BRANCH}" \
              "- Branch origem: ${HEAD_BRANCH}" \
              "- Commit validado: ${GITHUB_SHA}" \
              "Ao aceitar este PR, o merge em main executa build nativo, GitHub Release e deploy seletivo das Lambdas impactadas.")"
          else
            title="Atualiza lambdas Oficina ${RELEASE_TAG}"
            body="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n\n%s\n' \
              "PR automatico preparado pelo CI para sincronizar develop com main." \
              "- Versao: ${CURRENT_VERSION}" \
              "- Release alvo: ${RELEASE_TAG}" \
              "- Release existente: ${RELEASE_EXISTS}" \
              "- Modulos impactados: ${IMPACTED_MODULES:-<nenhum>}" \
              "- Branch destino: ${BASE_BRANCH}" \
              "- Branch origem: ${HEAD_BRANCH}" \
              "- Commit validado: ${GITHUB_SHA}" \
              "Como a release da versao atual ja existe, o merge em main nao executa novo build nativo, release nem deploy.")"
          fi

          existing_pr_url="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${BASE_BRANCH}" \
            --head "${head_ref}" \
            --state open \
            --json url \
            --jq '.[0].url // empty')"

          if [[ -n "${existing_pr_url}" ]]; then
            echo "Pull request ja existente: ${existing_pr_url}"
            exit 0
          fi

          set +e
          create_output="$(gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${BASE_BRANCH}" \
            --head "${head_ref}" \
            --title "${title}" \
            --body "${body}" \
            2>&1)"
          create_status=$?
          set -e

          if [[ ${create_status} -eq 0 ]]; then
            echo "${create_output}"
            exit 0
          fi

          existing_pr_url="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${BASE_BRANCH}" \
            --head "${head_ref}" \
            --state open \
            --json url \
            --jq '.[0].url // empty')"

          if [[ -n "${existing_pr_url}" ]]; then
            echo "Pull request ja existente: ${existing_pr_url}"
            exit 0
          fi

          echo "${create_output}" >&2
          exit "${create_status}"

  build_native_release_assets:
    name: build-native-release-assets
    runs-on: ubuntu-latest
    needs:
      - detect_release_state
      - integration_tests
      - validate_scripts
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      needs.detect_release_state.outputs.deploy_needed == 'true' &&
      needs.integration_tests.result == 'skipped' &&
      needs.validate_scripts.result == 'skipped'
    permissions:
      contents: write
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AUTH_LAMBDA_ARTIFACT_PREFIX: ${{ vars.AUTH_LAMBDA_ARTIFACT_PREFIX || vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET || vars.TF_STATE_BUCKET }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_RELEASE_TAG: ${{ needs.detect_release_state.outputs.release_tag }}
      LAMBDA_RELEASE_VERSION: ${{ needs.detect_release_state.outputs.current_version }}
      NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX: ${{ vars.NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-notificacao-lambda' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${LAMBDA_RELEASE_VERSION}" == *-SNAPSHOT ]]; then
            echo "A versao fechada da release nao pode ser SNAPSHOT: ${LAMBDA_RELEASE_VERSION}" >&2
            exit 1
          fi

          if gh release view "${LAMBDA_RELEASE_TAG}" >/dev/null 2>&1; then
            echo "A release ${LAMBDA_RELEASE_TAG} ja existe. Incremente a versao antes de gerar novos artefatos." >&2
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure build scripts are executable
        run: |
          chmod +x ./mvnw
          chmod +x ./scripts/*.sh

      - name: Build impacted native Lambdas
        shell: bash
        env:
          IMPACTED_MODULES: ${{ needs.detect_release_state.outputs.impacted_modules_csv }}
        run: |
          source ./scripts/lambda-modules.sh
          release_assets_staging_dir=".tmp/release-assets"
          rm -rf "${release_assets_staging_dir}"
          mkdir -p "${release_assets_staging_dir}"

          if [[ -z "${IMPACTED_MODULES}" ]]; then
            echo "Nenhum modulo impactado detectado para a release ${LAMBDA_RELEASE_TAG}" >&2
            exit 1
          fi

          for module in ${IMPACTED_MODULES//,/ }; do
            ./scripts/build-native-lambda.sh "${module}" -B -DskipTests -DskipITs=true -DfailIfNoTests=false
            asset_name="$(lambda_release_asset_name "${module}" "${LAMBDA_RELEASE_VERSION}" "${LAMBDA_ARCHITECTURE}")"
            cp "${module}/target/function.zip" "${release_assets_staging_dir}/${asset_name}"
          done

          mkdir -p target/release-assets
          cp "${release_assets_staging_dir}"/*.zip target/release-assets/

          sha256sum target/release-assets/*.zip > target/release-assets/checksums.txt

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${LAMBDA_RELEASE_TAG}" \
            target/release-assets/*.zip \
            target/release-assets/checksums.txt \
            --target "${GITHUB_SHA}" \
            --title "${LAMBDA_RELEASE_TAG}" \
            --notes "Release das Lambdas Oficina ${LAMBDA_RELEASE_VERSION} (${LAMBDA_ARCHITECTURE})."

      - name: Configure AWS credentials
        if: env.LAMBDA_ARTIFACT_BUCKET != ''
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Store release assets in S3
        if: env.LAMBDA_ARTIFACT_BUCKET != ''
        shell: bash
        env:
          IMPACTED_MODULES: ${{ needs.detect_release_state.outputs.impacted_modules_csv }}
        run: |
          for module in ${IMPACTED_MODULES//,/ }; do
            ./scripts/s3-native-lambda-artifact.sh "${module}" store
          done

      - name: Skip S3 native package store
        if: env.LAMBDA_ARTIFACT_BUCKET == ''
        run: echo "LAMBDA_ARTIFACT_BUCKET/TF_STATE_BUCKET ausente; os pacotes ficaram somente no GitHub Release."

      - name: Upload native packages
        uses: actions/upload-artifact@v6
        with:
          name: lambda-native-packages
          path: |
            auth-lambda/target/*.zip
            notificacao-lambda/target/*.zip
            target/release-assets/*.zip
            target/release-assets/checksums.txt
          if-no-files-found: error

  deploy_lambda:
    name: deploy-lambda
    runs-on: ubuntu-latest
    needs:
      - detect_release_state
      - build_native_release_assets
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      needs.detect_release_state.outputs.deploy_needed == 'true' &&
      needs.build_native_release_assets.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        module:
          - auth-lambda
          - notificacao-lambda
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE || 'require' }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      MASTER_SECRET_ARN: ${{ vars.MASTER_SECRET_ARN }}
      MASTER_DB_USER: ${{ vars.MASTER_DB_USER }}
      MASTER_DB_PASSWORD: ${{ secrets.MASTER_DB_PASSWORD }}
      BOOTSTRAP_AUTH_DB_USER: ${{ vars.BOOTSTRAP_AUTH_DB_USER || 'true' }}
      AUTH_DB_USER: ${{ vars.AUTH_DB_USER || 'oficina_auth_lambda' }}
      AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
      AUTH_DB_ALLOW_SCHEMA_CHANGES: ${{ vars.AUTH_DB_ALLOW_SCHEMA_CHANGES || 'false' }}
      STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER: ${{ vars.STORE_AUTH_DB_SECRET_IN_SECRETS_MANAGER || 'true' }}
      AUTH_DB_SECRET_NAME: ${{ vars.AUTH_DB_SECRET_NAME || 'oficina/lab/database/auth-lambda' }}
      AUTH_DB_SECRET_KMS_KEY_ID: ${{ vars.AUTH_DB_SECRET_KMS_KEY_ID }}
      ROTATE_AUTH_DB_PASSWORD: ${{ vars.ROTATE_AUTH_DB_PASSWORD || 'false' }}
      AUTO_ALLOW_DEPLOY_RUNNER_CIDR: ${{ vars.AUTO_ALLOW_DEPLOY_RUNNER_CIDR || 'true' }}
      CI_RUNNER_PUBLIC_IP_URL: ${{ vars.CI_RUNNER_PUBLIC_IP_URL || 'https://checkip.amazonaws.com' }}
      AUTH_LAMBDA_ATTACH_VPC: ${{ vars.AUTH_LAMBDA_ATTACH_VPC || 'true' }}
      AUTH_LAMBDA_ARTIFACT_PREFIX: ${{ vars.AUTH_LAMBDA_ARTIFACT_PREFIX || vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      AUTH_LAMBDA_EXTRA_ENV_JSON: ${{ vars.AUTH_LAMBDA_EXTRA_ENV_JSON || '{}' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      AUTH_LAMBDA_ROLE_ARN: ${{ secrets.AUTH_LAMBDA_ROLE_ARN || secrets.LAMBDA_ROLE_ARN }}
      AUTH_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.AUTH_LAMBDA_SECURITY_GROUP_NAME }}
      AUTH_LAMBDA_SUBNET_IDS: ${{ vars.AUTH_LAMBDA_SUBNET_IDS || vars.LAMBDA_SUBNET_IDS }}
      AUTH_LAMBDA_TIMEOUT: ${{ vars.AUTH_LAMBDA_TIMEOUT || vars.LAMBDA_TIMEOUT || '15' }}
      AUTH_LAMBDA_VPC_ID: ${{ vars.AUTH_LAMBDA_VPC_ID || vars.LAMBDA_VPC_ID }}
      AUTH_API_GATEWAY_ID: ${{ vars.AUTH_API_GATEWAY_ID || vars.API_GATEWAY_ID }}
      AUTH_API_GATEWAY_NAME: ${{ vars.AUTH_API_GATEWAY_NAME || vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      AUTH_API_GATEWAY_ROUTE_KEY: ${{ vars.AUTH_API_GATEWAY_ROUTE_KEY || 'POST /auth' }}
      AUTH_API_GATEWAY_ROUTE_KEYS: ${{ vars.AUTH_API_GATEWAY_ROUTE_KEYS || 'POST /auth;POST /auth/token;GET /.well-known/openid-configuration;GET /.well-known/jwks.json' }}
      ATTACH_API_GATEWAY: ${{ vars.ATTACH_API_GATEWAY || 'true' }}
      API_GATEWAY_PAYLOAD_FORMAT_VERSION: ${{ vars.API_GATEWAY_PAYLOAD_FORMAT_VERSION || '2.0' }}
      API_GATEWAY_TIMEOUT_MILLISECONDS: ${{ vars.API_GATEWAY_TIMEOUT_MILLISECONDS || '30000' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '256' }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'provided.al2023' }}
      LAMBDA_SECRET_INJECTION_MODE: ${{ vars.LAMBDA_SECRET_INJECTION_MODE || 'env-vars' }}
      MP_JWT_VERIFY_PUBLICKEY: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY }}
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY_LOCATION }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      JWT_SECRET_KMS_KEY_ID: ${{ vars.JWT_SECRET_KMS_KEY_ID }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      NOTIFICACAO_LAMBDA_ATTACH_VPC: ${{ vars.NOTIFICACAO_LAMBDA_ATTACH_VPC || 'true' }}
      NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX: ${{ vars.NOTIFICACAO_LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-notificacao-lambda' }}
      NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON: ${{ secrets.NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON || vars.NOTIFICACAO_LAMBDA_EXTRA_ENV_JSON || '{"QUARKUS_MAILER_FROM":"noreply@oficina.local","QUARKUS_MAILER_PORT":"1025","QUARKUS_MAILER_TLS":"false","QUARKUS_MAILER_START_TLS":"DISABLED"}' }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      NOTIFICACAO_LAMBDA_ROLE_ARN: ${{ secrets.NOTIFICACAO_LAMBDA_ROLE_ARN || secrets.LAMBDA_ROLE_ARN }}
      NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME || format('{0}-notificacao-lambda', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      NOTIFICACAO_LAMBDA_SUBNET_IDS: ${{ vars.NOTIFICACAO_LAMBDA_SUBNET_IDS }}
      NOTIFICACAO_LAMBDA_TIMEOUT: ${{ vars.NOTIFICACAO_LAMBDA_TIMEOUT || vars.LAMBDA_TIMEOUT || '15' }}
      NOTIFICACAO_LAMBDA_VPC_ID: ${{ vars.NOTIFICACAO_LAMBDA_VPC_ID }}
      NOTIFICACAO_API_GATEWAY_ID: ${{ vars.NOTIFICACAO_API_GATEWAY_ID || vars.API_GATEWAY_ID }}
      NOTIFICACAO_API_GATEWAY_NAME: ${{ vars.NOTIFICACAO_API_GATEWAY_NAME || vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      NOTIFICACAO_API_GATEWAY_ROUTE_KEY: ${{ vars.NOTIFICACAO_API_GATEWAY_ROUTE_KEY || 'POST /notificacoes/email' }}
      NOTIFICACAO_API_GATEWAY_ROUTE_KEYS: ${{ vars.NOTIFICACAO_API_GATEWAY_ROUTE_KEYS || 'POST /notificacoes/email' }}
      OFICINA_AUTH_AUDIENCE: ${{ vars.OFICINA_AUTH_AUDIENCE || 'oficina-app' }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER }}
      OFICINA_AUTH_KEY_ID: ${{ vars.OFICINA_AUTH_KEY_ID || 'oficina-lab-rsa' }}
      OFICINA_AUTH_SCOPE: ${{ vars.OFICINA_AUTH_SCOPE || 'oficina-app' }}
      QUARKUS_DATASOURCE_JDBC_URL: ${{ secrets.QUARKUS_DATASOURCE_JDBC_URL }}
      QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.QUARKUS_DATASOURCE_PASSWORD }}
      QUARKUS_DATASOURCE_USERNAME: ${{ secrets.QUARKUS_DATASOURCE_USERNAME }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
      SMALLRYE_JWT_SIGN_KEY: ${{ secrets.SMALLRYE_JWT_SIGN_KEY }}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: ${{ secrets.SMALLRYE_JWT_SIGN_KEY_LOCATION }}
    steps:
      - name: Checkout
        if: ${{ (matrix.module == 'auth-lambda' && needs.detect_release_state.outputs.auth_lambda_impacted == 'true') || (matrix.module == 'notificacao-lambda' && needs.detect_release_state.outputs.notificacao_lambda_impacted == 'true') }}
        uses: actions/checkout@v5

      - name: Download native packages
        if: ${{ (matrix.module == 'auth-lambda' && needs.detect_release_state.outputs.auth_lambda_impacted == 'true') || (matrix.module == 'notificacao-lambda' && needs.detect_release_state.outputs.notificacao_lambda_impacted == 'true') }}
        uses: actions/download-artifact@v7
        with:
          name: lambda-native-packages
          path: .

      - name: Validate deploy inputs
        if: ${{ (matrix.module == 'auth-lambda' && needs.detect_release_state.outputs.auth_lambda_impacted == 'true') || (matrix.module == 'notificacao-lambda' && needs.detect_release_state.outputs.notificacao_lambda_impacted == 'true') }}
        shell: bash
        run: |
          missing=()
          [[ -n "${AWS_ACCESS_KEY_ID}" ]] || missing+=("AWS_ACCESS_KEY_ID")
          [[ -n "${AWS_SECRET_ACCESS_KEY}" ]] || missing+=("AWS_SECRET_ACCESS_KEY")
          if [[ "${{ matrix.module }}" == "auth-lambda" ]]; then
            [[ "${ATTACH_API_GATEWAY}" != "true" || -n "${AUTH_API_GATEWAY_ID}" || -n "${AUTH_API_GATEWAY_NAME}" ]] || missing+=("AUTH_API_GATEWAY_ID|AUTH_API_GATEWAY_NAME")
          fi
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing GitHub Environment values for environment 'lab': ${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        if: ${{ (matrix.module == 'auth-lambda' && needs.detect_release_state.outputs.auth_lambda_impacted == 'true') || (matrix.module == 'notificacao-lambda' && needs.detect_release_state.outputs.notificacao_lambda_impacted == 'true') }}
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy native Lambda
        if: ${{ (matrix.module == 'auth-lambda' && needs.detect_release_state.outputs.auth_lambda_impacted == 'true') || (matrix.module == 'notificacao-lambda' && needs.detect_release_state.outputs.notificacao_lambda_impacted == 'true') }}
        run: |
          chmod +x ./scripts/*.sh
          ./scripts/deploy-native-lambda.sh "${{ matrix.module }}"
