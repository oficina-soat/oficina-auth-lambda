name: Redeploy Lambda Lab

on:
  workflow_dispatch:

concurrency:
  group: lab-lambda
  cancel-in-progress: false

jobs:
  build_and_unit_tests:
    if: github.ref_name == 'main'
    name: build-and-unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Build application and run unit tests
        run: ./mvnw -B clean package -DskipITs=true -DfailIfNoTests=false

  integration_tests:
    if: github.ref_name == 'main'
    name: integration-tests
    runs-on: ubuntu-latest
    needs: build_and_unit_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure mvnw is executable
        run: chmod +x ./mvnw

      - name: Run integration tests
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

  build_native_lambda:
    if: github.ref_name == 'main'
    name: build-native-lambda
    runs-on: ubuntu-latest
    needs: integration_tests
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_ARTIFACT_BUCKET: ${{ vars.LAMBDA_ARTIFACT_BUCKET || vars.TF_STATE_BUCKET }}
      LAMBDA_ARTIFACT_PREFIX: ${{ vars.LAMBDA_ARTIFACT_PREFIX || 'oficina/lab/lambda/oficina-auth-lambda' }}
      LAMBDA_ARTIFACT_VERSION: ${{ github.sha }}
      LAMBDA_ARTIFACT_QUALIFIER: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure build scripts are executable
        run: |
          chmod +x ./mvnw
          chmod +x ./scripts/build-native-lambda.sh
          chmod +x ./scripts/s3-native-lambda-artifact.sh

      - name: Restore native Lambda package from S3
        id: native-package
        run: ./scripts/s3-native-lambda-artifact.sh restore

      - name: Build native Lambda package
        if: steps.native-package.outputs.restored != 'true'
        run: ./scripts/build-native-lambda.sh -B -DskipTests -DskipITs=true -DfailIfNoTests=false

      - name: Store native Lambda package in S3
        if: steps.native-package.outputs.restored != 'true'
        run: ./scripts/s3-native-lambda-artifact.sh store

      - name: Reuse stored native Lambda package
        if: steps.native-package.outputs.restored == 'true'
        run: |
          test -f target/function.zip
          test -f target/oficina-auth-lambda-native.zip
          echo "Pacote nativo restaurado do S3 para $GITHUB_SHA"

      - name: Upload Lambda package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-native-package
          path: |
            target/function.zip
            target/oficina-auth-lambda-native.zip
          if-no-files-found: error

  deploy_lambda:
    if: github.ref_name == 'main'
    name: deploy-lambda
    runs-on: ubuntu-latest
    needs: build_native_lambda
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || vars.DB_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_SSLMODE: ${{ vars.DB_SSLMODE || 'require' }}
      DB_SECURITY_GROUP_IDS: ${{ vars.DB_SECURITY_GROUP_IDS }}
      LAMBDA_FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      LAMBDA_RUNTIME: ${{ vars.LAMBDA_RUNTIME || 'provided.al2023' }}
      LAMBDA_ARCHITECTURE: ${{ vars.LAMBDA_ARCHITECTURE || 'x86_64' }}
      LAMBDA_MEMORY_SIZE: ${{ vars.LAMBDA_MEMORY_SIZE || '256' }}
      LAMBDA_TIMEOUT: ${{ vars.LAMBDA_TIMEOUT || '15' }}
      LAMBDA_VPC_ID: ${{ vars.LAMBDA_VPC_ID }}
      LAMBDA_SUBNET_IDS: ${{ vars.LAMBDA_SUBNET_IDS }}
      LAMBDA_SECURITY_GROUP_NAME: ${{ vars.LAMBDA_SECURITY_GROUP_NAME }}
      ATTACH_API_GATEWAY: ${{ vars.ATTACH_API_GATEWAY || 'true' }}
      API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID }}
      API_GATEWAY_NAME: ${{ vars.API_GATEWAY_NAME || format('{0}-http-api', vars.EKS_CLUSTER_NAME || 'eks-lab') }}
      API_GATEWAY_ROUTE_KEY: ${{ vars.API_GATEWAY_ROUTE_KEY || 'POST /auth' }}
      API_GATEWAY_PAYLOAD_FORMAT_VERSION: ${{ vars.API_GATEWAY_PAYLOAD_FORMAT_VERSION || '2.0' }}
      API_GATEWAY_TIMEOUT_MILLISECONDS: ${{ vars.API_GATEWAY_TIMEOUT_MILLISECONDS || '30000' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
      QUARKUS_DATASOURCE_USERNAME: ${{ secrets.QUARKUS_DATASOURCE_USERNAME }}
      QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.QUARKUS_DATASOURCE_PASSWORD }}
      QUARKUS_DATASOURCE_JDBC_URL: ${{ secrets.QUARKUS_DATASOURCE_JDBC_URL }}
      MP_JWT_VERIFY_PUBLICKEY: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY }}
      MP_JWT_VERIFY_PUBLICKEY_LOCATION: ${{ secrets.MP_JWT_VERIFY_PUBLICKEY_LOCATION }}
      SMALLRYE_JWT_SIGN_KEY: ${{ secrets.SMALLRYE_JWT_SIGN_KEY }}
      SMALLRYE_JWT_SIGN_KEY_LOCATION: ${{ secrets.SMALLRYE_JWT_SIGN_KEY_LOCATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-native-package
          path: target

      - name: Validate deploy inputs
        shell: bash
        run: |
          missing=()
          [[ -n "${AWS_ACCESS_KEY_ID}" ]] || missing+=("AWS_ACCESS_KEY_ID")
          [[ -n "${AWS_SECRET_ACCESS_KEY}" ]] || missing+=("AWS_SECRET_ACCESS_KEY")
          [[ -n "${EKS_CLUSTER_NAME}" ]] || missing+=("EKS_CLUSTER_NAME")
          [[ -n "${LAMBDA_FUNCTION_NAME}" ]] || missing+=("LAMBDA_FUNCTION_NAME")
          [[ -n "${QUARKUS_DATASOURCE_USERNAME}" ]] || missing+=("QUARKUS_DATASOURCE_USERNAME")
          [[ -n "${QUARKUS_DATASOURCE_PASSWORD}" ]] || missing+=("QUARKUS_DATASOURCE_PASSWORD")
          [[ "${ATTACH_API_GATEWAY}" != "true" || -n "${API_GATEWAY_ID}" || -n "${API_GATEWAY_NAME}" ]] || missing+=("API_GATEWAY_ID|API_GATEWAY_NAME")
          [[ "${ATTACH_API_GATEWAY}" != "true" || -n "${API_GATEWAY_ROUTE_KEY}" ]] || missing+=("API_GATEWAY_ROUTE_KEY")

          if [[ -z "${MP_JWT_VERIFY_PUBLICKEY}" && -z "${MP_JWT_VERIFY_PUBLICKEY_LOCATION}" ]]; then
            missing+=("MP_JWT_VERIFY_PUBLICKEY|MP_JWT_VERIFY_PUBLICKEY_LOCATION")
          fi

          if [[ -z "${SMALLRYE_JWT_SIGN_KEY}" && -z "${SMALLRYE_JWT_SIGN_KEY_LOCATION}" ]]; then
            missing+=("SMALLRYE_JWT_SIGN_KEY|SMALLRYE_JWT_SIGN_KEY_LOCATION")
          fi

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing GitHub Environment values for environment 'lab': ${missing[*]}" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy native Lambda
        shell: bash
        run: |
          chmod +x ./scripts/deploy-native-lambda.sh
          ./scripts/deploy-native-lambda.sh
